<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw 系统设置</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#f8fafc;--panel:#fff;--line:#e5e7eb;--text:#111827;--muted:#6b7280;--primary:#2563eb;--soft:#eff6ff}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text)}
    .page{max-width:1280px;margin:0 auto;padding:28px}
    .header{display:flex;justify-content:space-between;align-items:end;gap:18px;flex-wrap:wrap;margin-bottom:22px}
    .header h1{font-size:38px;letter-spacing:-.04em}
    .header p{color:var(--muted);margin-top:8px}
    .btn{border:none;border-radius:14px;padding:14px 18px;background:var(--primary);color:#fff;font-weight:700;cursor:pointer}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:24px;box-shadow:0 18px 40px rgba(15,23,42,.04)}
    .head{padding:22px 24px;border-bottom:1px solid var(--line)}
    .head h2{font-size:20px}
    .head p{font-size:13px;color:var(--muted);margin-top:8px;line-height:1.7}
    .body{padding:24px;display:grid;gap:18px}
    .field{display:grid;gap:8px}
    label{font-size:14px;font-weight:700}
    input,select,textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:14px 16px;background:#fbfdff;outline:none;font:inherit}
    textarea{min-height:110px;resize:vertical}
    .toggle{display:flex;justify-content:space-between;gap:16px;align-items:center;padding:16px 18px;border:1px solid var(--line);border-radius:16px;background:#fcfdff}
    .toggle .text strong{display:block;margin-bottom:6px}
    .toggle .text span{font-size:13px;color:var(--muted);line-height:1.7}
    .switch{width:54px;height:32px;border-radius:999px;background:#dbeafe;position:relative;flex-shrink:0}
    .switch::after{content:"";position:absolute;top:4px;left:26px;width:24px;height:24px;border-radius:50%;background:#2563eb}
    .note{padding:16px 18px;border-radius:16px;background:var(--soft);color:#1d4ed8;font-size:13px;line-height:1.8}
    @media (max-width: 920px){.grid{grid-template-columns:1fr}.page{padding:16px}.header h1{font-size:30px}}
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <div>
        <h1>系统设置</h1>
        <p>集中管理站点基础信息、后台安全策略、通知方式和系统展示配置。</p>
      </div>
      <button class="btn" onclick="location.href='./admin.html'">返回后台</button>
    </div>

    <div class="grid">
      <section class="card">
        <div class="head">
          <h2>站点基础配置</h2>
          <p>维护官网名称、默认描述和管理后台欢迎语。</p>
        </div>
        <div class="body">
          <div class="field">
            <label>站点名称</label>
            <input value="OpenClaw">
          </div>
          <div class="field">
            <label>默认副标题</label>
            <input value="可扩展的 AI 助手框架与运营控制台">
          </div>
          <div class="field">
            <label>站点说明</label>
            <textarea>OpenClaw 面向团队与个人提供可扩展的 AI 助手能力，支持插件生态、消息渠道接入与自动化工作流构建。</textarea>
          </div>
          <div class="note">后续可以继续接入真实的配置存储、环境变量和版本化发布流程。</div>
        </div>
      </section>

      <section class="card">
        <div class="head">
          <h2>安全与登录</h2>
          <p>控制后台入口的认证方式、安全提醒与访问策略。</p>
        </div>
        <div class="body">
          <div class="toggle">
            <div class="text"><strong>启用双因素认证</strong><span>建议给超级管理员与运营角色开启二次验证。</span></div>
            <div class="switch"></div>
          </div>
          <div class="toggle">
            <div class="text"><strong>登录异常提醒</strong><span>检测到新设备或异地登录时自动发送通知。</span></div>
            <div class="switch"></div>
          </div>
          <div class="field">
            <label>允许登录方式</label>
            <select>
              <option>邮箱 + 密码</option>
              <option>SSO 单点登录</option>
              <option>邮箱 + 双因素认证</option>
            </select>
          </div>
          <div class="field">
            <label>安全说明</label>
            <textarea>请定期轮换高权限账号密码，并开启设备信任与审计日志。</textarea>
          </div>
        </div>
      </section>
    </div>
  </div>
</body>
</html>
